# railway.toml
# Railway deployment configuration for ARIA.
# Runs FastAPI as the web service (public URL) + agent as a background worker.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use sh -c so $PORT gets expanded as a shell variable
startCommand = "sh -c 'alembic upgrade head && python src/model_store.py --download || 
(python src/features.py && python src/pricing_model.py && python src/demand_forecast.py) 
&& uvicorn api.main:app --host 0.0.0.0 --port $PORT'"
startupProbeInitialDelaySeconds = 180
restartPolicyType               = "ON_FAILURE"
restartPolicyMaxRetries         = 3

[deploy.healthcheck]
type            = "HTTP"
httpPath        = "/"
intervalSeconds = 30
timeoutSeconds  = 15