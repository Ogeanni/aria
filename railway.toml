# railway.toml
# Railway deployment configuration for ARIA.
# Runs FastAPI as the web service (public URL) + agent as a background worker.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use sh -c so $PORT gets expanded as a shell variable
startCommand = "sh -c 'uvicorn api.main:app --host 0.0.0.0 --port $PORT'"
startupProbeInitialDelaySeconds = 30
restartPolicyType               = "ON_FAILURE"
restartPolicyMaxRetries         = 3

[deploy.healthcheck]
type            = "HTTP"
httpPath        = "/"
intervalSeconds = 30
timeoutSeconds  = 10