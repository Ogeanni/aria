[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    --verbose
    --tb=short
    --no-header
    -q

# Ignore warnings from third-party libraries
filterwarnings =
    ignore::FutureWarning
    ignore::DeprecationWarning
    ignore::UserWarning:prophet
    ignore::UserWarning:cmdstanpy