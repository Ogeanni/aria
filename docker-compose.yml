# ─────────────────────────────────────────────────────────────────────
# ARIA docker-compose.yml
#
# PORT STRATEGY — permanent solution to host conflicts:
#
#   Docker uses a dedicated port range that never overlaps local dev:
#     Postgres : host 5433  → container 5432
#     Redis    : host 6380  → container 6379
#     API      : host 8900  → container 8000
#
#   Local development (running Python directly on your Mac):
#     Postgres : localhost:5432   (your existing local Postgres)
#     API      : localhost:8000   (uvicorn)
#     Streamlit: localhost:8501   (streamlit)
#
#   Inside Docker (containers talking to each other):
#     postgres:5432, redis:6379, api:8000
#     — uses service names, never touches host ports
#
#   Rule: never run Docker and local services at the same time.
#   Docker owns 5433/6380/8900. Local owns 5432/6379/8000/8501.
#
# USAGE:
#   docker compose up -d              start everything
#   docker compose logs -f api        follow API logs
#   docker compose logs -f agent      follow agent logs
#   docker compose down               stop everything
#   docker compose down -v            stop + delete all data (DESTRUCTIVE)
#
# ACCESS when Docker is running:
#   API + Swagger : http://localhost:8900/docs
#   Postgres      : localhost:5433  (pgAdmin or psql)
#   Redis         : localhost:6380
# ─────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aria
      POSTGRES_USER:     aria_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host:5433 → container:5432 — no conflict with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria_user -d aria"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aria_network

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aria_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"   # host:6380 → container:6379 — no conflict if Redis runs locally
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aria_network

  # ── Migrations ───────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aria_migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://aria_user:${POSTGRES_PASSWORD}@postgres:5432/aria
      REDIS_URL:    redis://redis:6379/0
      DEMO_MODE:    "true"
      LOG_LEVEL:    WARNING
      PYTHONPATH:   /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aria_network
    restart: "no"

  # ── Seed ─────────────────────────────────────────────────────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aria_seed
    command: ["python", "scripts/seed_db.py"]
    environment:
      DATABASE_URL: postgresql://aria_user:${POSTGRES_PASSWORD}@postgres:5432/aria
      REDIS_URL:    redis://redis:6379/0
      DEMO_MODE:    "true"
      LOG_LEVEL:    WARNING
      PYTHONPATH:   /app
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - aria_network
    restart: "no"

  # ── API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aria_api
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL:      postgresql://aria_user:${POSTGRES_PASSWORD}@postgres:5432/aria
      REDIS_URL:         redis://redis:6379/0
      DEMO_MODE:         ${DEMO_MODE:-true}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SERPAPI_KEY:       ${SERPAPI_KEY:-}
      PYTHONPATH:        /app
    ports:
      - "8900:8000"   # host:8900 → container:8000 — no conflict with local uvicorn
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aria_network

  # ── Agent ─────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aria_agent
    restart: unless-stopped
    environment:
      DATABASE_URL:               postgresql://aria_user:${POSTGRES_PASSWORD}@postgres:5432/aria
      REDIS_URL:                  redis://redis:6379/0
      DEMO_MODE:                  ${DEMO_MODE:-true}
      LOG_LEVEL:                  ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY:             ${OPENAI_API_KEY:-}
      SERPAPI_KEY:                ${SERPAPI_KEY:-}
      AGENT_SCHEDULE_MINUTES:     ${AGENT_SCHEDULE_MINUTES:-60}
      AGENT_AUTO_APPROVE_MAX_PCT: ${AGENT_AUTO_APPROVE_MAX_PCT:-10}
      PYTHONPATH:                 /app
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - aria_network

  # ── CLI ───────────────────────────────────────────────────────────────
  # Run one-off commands: docker compose run cli python src/pricing_model.py
  cli:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aria_cli
    environment:
      DATABASE_URL: postgresql://aria_user:${POSTGRES_PASSWORD}@postgres:5432/aria
      REDIS_URL:    redis://redis:6379/0
      DEMO_MODE:    ${DEMO_MODE:-true}
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}
      PYTHONPATH:   /app
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aria_network
    profiles:
      - tools
    restart: "no"


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local


networks:
  aria_network:
    driver: bridge