# alembic.ini
# Alembic configuration for ARIA.
# Database URL is NOT set here — it is read from .env via config/settings.py
# See db/migrations/env.py

[alembic]
script_location = db/migrations
prepend_sys_path = .
version_path_separator = os

# File name template for new migration files
# Includes timestamp for clear ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long migration slugs
truncate_slug_length = 40

# sqlalchemy.url is intentionally NOT set here.
# It is injected from .env via env.py.
# Setting it here would risk committing credentials to source control.

[post_write_hooks]
# Optional: run black formatter on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S